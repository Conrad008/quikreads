<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quikreads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo"> <h1>Quikreads</h1></div>

        <nav class="links">
            <ul>
                <li><a href="#home">home</a></li>
                <li><a href="#books">books</a></li>
                <li><a href="#deals">deals</a></li>
                <li><a href="#contact">contact</a></li>
            </ul>

        </nav>
        <button class="cart-btn"> cart</button>

    </header>
    <section id="home" class="home">
         <h2>Premium book Store</h2>
        <p>Discover the wonderful world of books at unbeatable prices.</p>

    </section>
    <section id="books" class="books">
         <select>
            <option>filter by category</option>
            <option>Novels</option>
            <option>Childrens books</option>
            <option>Short stories</option>
            <option>graphic novels</option>
        </select>

        <select>
            <option>Sort By</option>
            <option>Price Low to High</option>
            <option>Price High to Low</option>
            <option>Top Rated</option>
            <option>General exhibition </option>
        </select>

    </section>

</html>
